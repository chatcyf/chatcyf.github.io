<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陈一发儿电台</title>
    <link rel="shortcut icon" href="https://cdn.chatcyf.com/static/2020/08/1597812673-10c41f7d6a5faf7.png" type="image/x-icon">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #111;
            color: #fff;
        }
        /* 动态高斯模糊背景 */
        .bg-blur {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: url('https://cdn.chatcyf.com/static/2020/05/1589707290-561c9ab24f7b7cc.jpg') center/cover no-repeat;
            filter: blur(60px) brightness(0.4);
            z-index: 1;
            transform: scale(1.1);
        }
        /* 主播放卡片 (响应式自适应) */
        .player-card {
            position: relative;
            z-index: 2;
    
            /* 1. 强制设为你想要的宽度 */
            width: 480px; 
            /* 2. 限制在手机小屏幕上最大只占 95%，防止超出屏幕出现横向滚动条 */
            max-width: 90%; 

            padding: 30px 25px;
            background: rgba(255, 255, 255, 0.12);
           backdrop-filter: blur(25px);
          -webkit-backdrop-filter: blur(25px);
          border: 1px solid rgba(255, 255, 255, 0.2);
          border-radius: 24px;
          box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
          display: flex;
           flex-direction: column;
          align-items: center;
          text-align: center;
        }
        /* 唱片封面旋转效果 */
        .cover-wrapper {
            width: 220px;
            height: 220px;
            margin-bottom: 25px;
            border-radius: 50%;
            padding: 6px;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            animation: rotate 20s linear infinite;
            animation-play-state: paused;
        }
        .playing .cover-img {
            animation-play-state: running;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        /* 信息展示 */
        .track-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .track-artist {
            font-size: 0.9rem;
            opacity: 0.75;
            margin-bottom: 20px;
        }
        /* 进度条 */
        .progress-container {
            width: 100%;
            margin-bottom: 20px;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #fff;
            border-radius: 3px;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 8px;
        }
        /* 控制按钮 */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .btn-play {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: #ffffff;
            color: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-play:hover {
            transform: scale(1.08);
            background: #f0f0f0;
        }
        .btn-play svg {
            width: 26px;
            height: 26px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="bg-blur"></div>

    <div class="player-card" id="playerCard">
        <div class="cover-wrapper">
            <img class="cover-img" src="https://cdn.chatcyf.com/static/2020/05/1589799830-55c03779d7d1f15.jpg" alt="Cover">
        </div>
        <div class="track-title">陈一发儿电台</div>
        <div class="track-artist">ChatCYF</div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">00:00</span>
                <span id="duration">00:00</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn-play" id="playBtn" aria-label="Play">
                <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
        </div>
    </div>

    <audio id="audio" src="https://radio.chatcyf.com/chenyifaer.mp3" preload="auto"></audio>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const playerCard = document.getElementById('playerCard');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');

        const playSvg = '<path d="M8 5v14l11-7z"/>';
        const pauseSvg = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';

        function togglePlay() {
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }

        playBtn.addEventListener('click', togglePlay);

        audio.addEventListener('play', () => {
            playerCard.classList.add('playing');
            playIcon.innerHTML = pauseSvg;
        });

        audio.addEventListener('pause', () => {
            playerCard.classList.remove('playing');
            playIcon.innerHTML = playSvg;
        });

        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            const percent = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = `${percent}%`;
            currentTimeEl.textContent = formatTime(audio.currentTime);
        });

        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration);
        });

        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.width;
            audio.currentTime = (clickX / width) * audio.duration;
        });

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins < 10 ? '0' : ''}${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
        // 页面加载完成后强制触发预加载
        window.addEventListener('DOMContentLoaded', () => {
            audio.load();
        });
    </script>
</body>
</html>
